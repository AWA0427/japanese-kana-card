<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端核心适配：禁止缩放，适配屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>日语假名卡片</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <h1>日语假名学习卡片</h1>
        <button id="settingsBtn" class="settings-btn">设置</button>
    </header>

    <!-- 主内容区 -->
    <main class="container">
        <!-- 假名卡片 -->
        <div id="kanaCard" class="card">
            <div id="displayContent" class="card-content">点击开始</div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <input 
                type="text" 
                id="answerInput" 
                placeholder="请输入答案"
                autocapitalize="off"
                autocorrect="off"
                inputmode="text"
            >
            <button id="submitBtn" class="submit-btn">提交</button>
        </div>

        <!-- 反馈提示 -->
        <div id="feedback" class="feedback"></div>
    </main>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>学习设置</h2>
            
            <!-- 假名类型 -->
            <div class="setting-group">
                <label>假名类型</label>
                <div>
                    <label><input type="radio" name="kanaType" value="hiragana" checked> 平假名</label>
                    <label><input type="radio" name="kanaType" value="katakana"> 片假名</label>
                </div>
            </div>

            <!-- 训练模式 -->
            <div class="setting-group">
                <label>训练模式</label>
                <div>
                    <label><input type="radio" name="trainingMode" value="forward" checked> 正向（看假名写罗马字）</label>
                    <label><input type="radio" name="trainingMode" value="reverse"> 逆向（看罗马字写假名）</label>
                </div>
            </div>

            <!-- 逆向模式假名类型（默认隐藏） -->
            <div id="reverseKanaType" class="setting-group" style="display:none;">
                <label>逆向模式练习类型</label>
                <div>
                    <label><input type="radio" name="reverseType" value="hiragana" checked> 平假名</label>
                    <label><input type="radio" name="reverseType" value="katakana"> 片假名</label>
                </div>
            </div>

            <div class="modal-buttons">
                <button id="applyBtn" class="apply-btn">完成</button>
                <button id="closeBtn" class="close-btn">关闭</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
