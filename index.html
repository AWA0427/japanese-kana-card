<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>假名逆向练习</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部边栏（修复淡紫色问题） -->
  <header class="top-sidebar">
    <h1>假名逆向练习</h1>
    <nav>
      <a href="#practice">练习</a>
      <a href="#settings">设置</a>
    </nav>
  </header>

  <!-- 假名类型选择弹窗（逆向模式前置选择） -->
  <div id="kana-type-modal" class="modal">
    <div class="modal-content">
      <h3>选择练习类型</h3>
      <div class="kana-type-options">
        <button id="hiragana-btn" class="kana-btn">平假名</button>
        <button id="katakana-btn" class="kana-btn">片假名</button>
      </div>
    </div>
  </div>

  <!-- 练习区域（移动端输入体验优化核心区） -->
  <section id="practice" class="practice-section">
    <div class="romanji-card">
      <h2 id="current-romanji">罗马音：a</h2>
    </div>
    <div class="input-area">
      <input type="text" id="kana-input" placeholder="输入对应的假名" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="submit-btn">提交</button>
    </div>
    <div class="feedback">
      <p id="feedback-text"></p>
    </div>
  </section>

  <!-- 设置界面（UI布局优化） -->
  <section id="settings" class="settings-section">
    <h2>设置</h2>
    <div class="settings-grid">
      <div class="setting-item">
        <label for="theme">主题选择</label>
        <select id="theme">
          <option value="purple" selected>紫色主题</option>
          <option value="light">浅色主题</option>
        </select>
      </div>
      <div class="setting-item">
        <label for="font-size">字体大小</label>
        <input type="range" id="font-size" min="14" max="24" value="16">
        <span id="font-size-value">16px</span>
      </div>
      <div class="setting-item">
        <label for="practice-speed">练习切换速度</label>
        <select id="practice-speed">
          <option value="slow">慢</option>
          <option value="normal" selected>正常</option>
          <option value="fast">快</option>
        </select>
      </div>
      <div class="setting-item">
        <label for="reset-progress">重置练习进度</label>
        <button id="reset-progress">重置</button>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
